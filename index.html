<!DOCTYPE html>
<html>
<head>
  <title>Maintenance</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      margin-top: 100px;
      background: #f9f9f9;
      overflow: hidden;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    .duck-container {
      position: relative;
      width: 100%;
      height: 100px;
      margin-top: 40px;
    }

    .duck {
      position: absolute;
      font-size: 50px;
      animation: walk 6s linear infinite alternate;
    }

    @keyframes walk {
      from {
        left: 10%;
        transform: scaleX(1);
      }
      49% {
        transform: scaleX(1);
      }
      50% {
        transform: scaleX(-1);
      }
      to {
        left: 80%;
        transform: scaleX(-1);
      }
    }

    .loading {
      margin-top: 30px;
      font-size: 18px;
      color: #888;
      letter-spacing: 2px;
    }

    .dots::after {
      content: "";
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0% { content: ""; }
      33% { content: "."; }
      66% { content: ".."; }
      100% { content: "..."; }
    }
  </style>
</head>
<body>
  <h1>🦆⏳ Site Under Maintenance</h1>
  <p>Waddling back soon...</p>

  <div class="duck-container">
    <div class="duck">🦆</div>
  </div>

  <div class="loading">
    Loading<span class="dots"></span>
  </div>
</body>
</html>
